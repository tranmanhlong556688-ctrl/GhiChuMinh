name: Build Ghi Chu Minh v2 APK

on:
  push:
    branches: [ main, master, feature/ghi-chu-minh-v2 ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build APK
        id: build_apk
        continue-on-error: true
        run: |
          mkdir -p output
          gradle :app:assembleDebug --stacktrace --no-daemon 2>&1 | tee output/build-log.txt
          test ${PIPESTATUS[0]} -eq 0

      - name: Prepare APK artifact
        if: steps.build_apk.outcome == 'success'
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk output/GhiChuMinh-v2.0-debug.apk
          sha256sum output/GhiChuMinh-v2.0-debug.apk > output/GhiChuMinh-v2.0-debug.sha256

      - name: Upload APK artifact
        if: steps.build_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: GhiChuMinh-v2.0-apk
          path: |
            output/GhiChuMinh-v2.0-debug.apk
            output/GhiChuMinh-v2.0-debug.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GhiChuMinh-v2.0-build-log
          path: output/build-log.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Fail if APK build failed
        if: steps.build_apk.outcome != 'success'
        run: exit 1
