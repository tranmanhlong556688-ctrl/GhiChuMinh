name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Prepare APK artifact
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/GhiChuMinh-reminder-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhiChuMinh-reminder-debug-apk
          path: output/GhiChuMinh-reminder-debug.apk
          if-no-files-found: error
