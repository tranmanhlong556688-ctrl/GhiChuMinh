name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cài Android SDK
        uses: android-actions/setup-android@v3

      - name: Cài Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.10.2/bin" >> $GITHUB_PATH

      - name: Build APK debug
        run: gradle assembleDebug --no-daemon

      - name: Đổi tên APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/GhiChuMinh-debug.apk

      - name: Tải APK lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GhiChuMinh-debug-apk
          path: output/GhiChuMinh-debug.apk
